<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Área de Triângulo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Calculadora de Área de Triângulo</h1>
    </header>

    <main>
        <section>
            <h2>Calcular pela Base e Altura</h2>
            <form id="baseAlturaForm">
                <label for="base">Base:</label>
                <input type="number" id="base" required>
                <label for="altura">Altura:</label>
                <input type="number" id="altura" required>
                <button type="submit">Calcular</button>
                <p id="resultadoBaseAltura"></p>
            </form>
        </section>
        

        <section>
            <h2>Calcular pelos Lados (Fórmula de Heron)</h2>
            <form id="heronForm">
                <label for="ladoA">Lado A:</label>
                <input type="number" id="ladoA" required>
                <label for="ladoB">Lado B:</label>
                <input type="number" id="ladoB" required>
                <label for="ladoC">Lado C:</label>
                <input type="number" id="ladoC" required>
                <button type="submit">Calcular</button>
                <p id="resultadoHeron"></p>
            </form>
        </section>
    </main>

    <footer>
        <p>Feito com 💖 por Luciano Augusto da Silva Junior</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
